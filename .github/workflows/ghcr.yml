name: Publish image to GHCR

# Builds the HyPanel Docker image and publishes it to GitHub Container Registry
# so `install.sh` can `docker pull ghcr.io/by-sonic/hypanel:latest` instead of
# building from source on small VPSes. Uses the built-in GITHUB_TOKEN — no
# external registry secrets required.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/by-sonic/hypanel:latest
            ghcr.io/by-sonic/hypanel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
